<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Dangerous — Gestion des Chantiers de Colonisation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="header-logo">
      <span class="logo-bracket">[</span>
      <h1>SEY<span class="logo-app">APP</span></h1>
      <span class="logo-bracket">]</span>
    </div>
    <div class="lang-toggle" id="lang-toggle" aria-label="Langue des ressources">
      <button class="lang-btn active" data-lang="fr" title="Ressources en français">FR</button>
      <button class="lang-btn" data-lang="en" title="Resources in English">EN</button>
    </div>

    <div class="ship-capacity-block">
      <label for="ship-capacity" class="field-label">SOUTE — CAPACITÉ MAX</label>
      <div class="capacity-input-wrapper">
        <input type="number" id="ship-capacity" class="capacity-input" value="1216" min="1">
        <span class="capacity-unit">UNITÉS</span>
      </div>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="main-container">

    <!-- Barre d'onglets -->
    <div class="tabs-bar">
      <div class="tabs-list" id="tabs-list"></div>
      <button class="btn-new-tab" id="btn-new-chantier">
        <span class="btn-plus">+</span> NOUVEAU CHANTIER
      </button>
    </div>

    <!-- Zone de contenu de l'onglet actif -->
    <div class="tab-content-area" id="tab-content-area">
      <!-- Généré dynamiquement par script.js -->
    </div>

  </main>

  <!-- ===== TOAST NOTIFICATIONS ===== -->
  <div class="toast-container" id="toast-container"></div>

  <script src="script.js"></script>
</body>
</html>
